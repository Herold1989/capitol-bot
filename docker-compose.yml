services:
  db:
    image: postgres:16-alpine
    ports:
      - "55432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-capitol_bot}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
  bot:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:-capitol_bot}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      DISCORD_USER_ID: ${DISCORD_USER_ID:-}
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    command: ["python", "-m", "bot.cli", "--config", "config/strategy.yaml", "paper-run"]

volumes:
  postgres_data:
